name: linker CI - Build and Push Docker Image

on:
  push:
    branches:
      - main
  # Allow triggering this workflow manually from the Actions tab.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest

    # permissions for GITHUB_TOKEN in this job
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # set up modern Docker build backend (required for GitHub Actions caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata to produce two tags:
      # 1. short sha (points to exact commit for tracing and rollback)
      # 2. branch name (points to the latest image for each branch)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        id: build-and-push
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up future builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Successfully pushed image digest ${{ steps.build-and-push.outputs.digest }}"
